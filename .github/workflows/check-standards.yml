name: Check DfE Standards for Updates

on:
  schedule:
    - cron: '0 8 * * *'  # Run every day at 8am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  check-standards:
    runs-on: ubuntu-latest
    steps:
      - name: Check GOV.UK Content API for standard updates
        id: check
        run: |
          VERIFIED_DATE="2026-03-01"
          UPDATES=""

          declare -A STANDARDS
          STANDARDS[Broadband]="/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/broadband-internet-core-standard"
          STANDARDS[Cyber_Security]="/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/cyber-security-core-standard"
          STANDARDS[Leadership]="/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/digital-leadership-and-governance-core-standard"
          STANDARDS[Filtering]="/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/filtering-and-monitoring-core-standard"
          STANDARDS[Switching]="/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/network-switching-core-standard"
          STANDARDS[Wireless]="/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/wireless-network-core-standard"

          for NAME in "${!STANDARDS[@]}"; do
            PATH="${STANDARDS[$NAME]}"
            UPDATED=$(curl -s "https://www.gov.uk/api/content${PATH}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('public_updated_at','')[:10])" 2>/dev/null)
            
            if [ -n "$UPDATED" ] && [[ "$UPDATED" > "$VERIFIED_DATE" ]]; then
              UPDATES="${UPDATES}\n- **${NAME//_/ }** — GOV.UK updated: ${UPDATED} (tool last verified: ${VERIFIED_DATE}) — https://www.gov.uk${PATH}"
            fi
          done

          if [ -n "$UPDATES" ]; then
            echo "UPDATES_FOUND=true" >> $GITHUB_OUTPUT
            echo -e "UPDATES_BODY<<EOF" >> $GITHUB_OUTPUT
            echo -e "$UPDATES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "UPDATES_FOUND=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Issue if updates found
        if: steps.check.outputs.UPDATES_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'standards-update'
            });

            // Don't create duplicate issues
            const alreadyOpen = issues.some(i => i.title.includes('GOV.UK Standards Update Detected'));
            if (alreadyOpen) {
              console.log('Issue already open — skipping');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ GOV.UK Standards Update Detected — Review Required',
              body: `## DfE Standards Updated on GOV.UK\n\nThe following standards have been updated on GOV.UK since this tool was last verified (March 2026):\n\n${{ steps.check.outputs.UPDATES_BODY }}\n\n## Action Required\n\n1. Review the updated GOV.UK pages using the links above\n2. Check whether any questions, answer options or action tips in the tool need updating\n3. If changes are needed, update \`index.html\` and update the \`VERIFIED_DATE\` constant\n4. Close this issue once reviewed\n\n> This issue was created automatically by the daily standards check workflow.`,
              labels: ['standards-update']
            });

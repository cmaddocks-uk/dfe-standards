name: Check DfE Standards for Updates

on:
  schedule:
    - cron: '0 8 * * *'  # Run every day at 8am UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  check-standards:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check GOV.UK Content API for standard updates
        id: check
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          from datetime import datetime

          VERIFIED_DATE = "2026-03-01"
          verified_dt = datetime.strptime(VERIFIED_DATE, "%Y-%m-%d")

          STANDARDS = {
            "Broadband": "/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/broadband-internet-core-standard",
            "Cyber Security": "/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/cyber-security-core-standard",
            "Digital Leadership": "/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/digital-leadership-and-governance-core-standard",
            "Filtering & Monitoring": "/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/filtering-and-monitoring-core-standard",
            "Network Switching": "/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/network-switching-core-standard",
            "Wireless Network": "/guidance/meeting-digital-and-technology-standards-in-schools-and-colleges/wireless-network-core-standard",
          }

          updates = []

          for name, path in STANDARDS.items():
            try:
              url = f"https://www.gov.uk/api/content{path}"
              req = urllib.request.Request(url, headers={"Accept": "application/json"})
              with urllib.request.urlopen(req, timeout=10) as resp:
                data = json.loads(resp.read())
                updated_str = data.get("public_updated_at", "")[:10]
                updated_dt = datetime.strptime(updated_str, "%Y-%m-%d")
                if updated_dt > verified_dt:
                  updates.append(f"- **{name}** — GOV.UK updated: {updated_str} — https://www.gov.uk{path}")
            except Exception as e:
              print(f"Error checking {name}: {e}")

          env_file = os.environ["GITHUB_OUTPUT"]
          with open(env_file, "a") as f:
            if updates:
              f.write("UPDATES_FOUND=true\n")
              body = "\n".join(updates)
              f.write(f"UPDATES_BODY<<EOF\n{body}\nEOF\n")
            else:
              f.write("UPDATES_FOUND=false\n")

          print(f"Updates found: {len(updates)}")
          for u in updates:
            print(u)
          PYEOF

      - name: Create GitHub Issue if updates found
        if: steps.check.outputs.UPDATES_FOUND == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['standards-update']
            });

            const alreadyOpen = issues.some(i => i.title.includes('GOV.UK Standards Update Detected'));
            if (alreadyOpen) {
              console.log('Issue already open — skipping');
              return;
            }

            const updates = `${{ steps.check.outputs.UPDATES_BODY }}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ GOV.UK Standards Update Detected — Review Required',
              body: `## DfE Standards Updated on GOV.UK\n\nThe following standards have been updated on GOV.UK since this tool was last verified (${new Date().toLocaleDateString('en-GB')}):\n\n${updates}\n\n## Action Required\n\n1. Review the updated GOV.UK pages using the links above\n2. Check whether any questions, answer options or action tips need updating\n3. If changes are needed, update \`index.html\` and update the \`VERIFIED_DATE\` constant\n4. Close this issue once reviewed\n\n> This issue was created automatically by the daily standards check workflow.`,
              labels: ['standards-update']
            });
